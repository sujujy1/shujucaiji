        // 渲染表格
        function renderTable(data) {
            const tableBody = document.getElementById('product-table');
            tableBody.innerHTML = '';
            
            data.forEach(product => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${product.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${product.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${product.category}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">¥${product.price}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${product.sales}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${product.stock}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${product.上架日期}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${product.description}</td>
                `;
                
                tableBody.appendChild(row);
            });
            
            // 更新数据统计
            document.getElementById('total-count').textContent = data.length;
        }

        // 筛选和排序功能
        function filterAndSort() {
            const categoryFilter = document.getElementById('category-filter').value;
            const sortBy = document.getElementById('sort-by').value;
            
            let filteredData = [...products];
            
            // 按类别筛选
            if (categoryFilter !== 'all') {
                filteredData = filteredData.filter(product => product.category === categoryFilter);
            }
            
            // 排序
            switch (sortBy) {
                case 'sales':
                    filteredData.sort((a, b) => b.sales - a.sales);
                    break;
                case 'price-asc':
                    filteredData.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filteredData.sort((a, b) => b.price - a.price);
                    break;
                default:
                    // 默认按ID排序
                    filteredData.sort((a, b) => a.id.localeCompare(b.id));
            }
            
            renderTable(filteredData);
        }

        // 导出CSV功能
        function exportCSV() {
            const headers = ['ID', '商品名称', '类型', '单价', '销量', '库存', '上架日期', '描述'];
            const rows = products.map(product => [
                product.id,
                product.name,
                product.category,
                product.price,
                product.sales,
                product.stock,
                product.上架日期,
                product.description
            ]);
            
            const csvContent = [
                headers.join(','),
                ...rows.map(row => row.join(','))
            ].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', '商品数据.csv');
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始渲染表格
            renderTable(products);
            
            // 绑定事件
            document.getElementById('category-filter').addEventListener('change', filterAndSort);
            document.getElementById('sort-by').addEventListener('change', filterAndSort);
            document.getElementById('export-btn').addEventListener('click', exportCSV);
        });
